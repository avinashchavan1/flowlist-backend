name: Keep Render alive

# Render free tier spins down a web service after 15 min idle (~30-60s cold start
# on next hit). This workflow pings /api/health every 10 min so the service never
# goes idle. GitHub-scheduled crons can be delayed up to ~5 min under load, so
# 10-min cadence stays safely under Render's 15-min idle threshold.
#
# Cost: GitHub Actions free tier is unlimited minutes for public repos. Each ping
# uses ~5 seconds of runner time.

on:
  # DAYTIME-ONLY keep-alive backup. Render free = 750 instance-hours/month; pinging
  # 24/7 burns the whole quota → billing suspension (this happened once). So we keep
  # the backend warm only during active hours (UTC 1-17 ≈ 6:30am-10:30pm IST),
  # letting it spin down overnight. ~16h/day ≈ 480h/month, safely under 750.
  # Primary pinger is cron-job.org (same daytime window). This GH job is the backup.
  schedule:
    - cron: '*/20 1-17 * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Ping health endpoint
        run: |
          set -e
          URL="https://flowlist-api-g6c3.onrender.com/api/health"
          curl -fsS --retry 2 --retry-delay 3 --max-time 75 "$URL"
          echo "Pinged $URL OK"
