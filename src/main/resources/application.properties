# ─── Server ───────────────────────────────────────────────
# Railway injects PORT; fall back to SERVER_PORT, then 8080
server.port=${PORT:${SERVER_PORT:8080}}

# ─── Database ─────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:flowlist}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USERNAME:flowlist_user}
spring.datasource.password=${DB_PASSWORD:flowlist_pass}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ─── JPA / Hibernate ──────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ─── JWT ──────────────────────────────────────────────────
# Secret must be at least 256 bits (32 chars) for HS256
app.jwt.secret=${JWT_SECRET:flowlist-super-secret-key-change-in-production-256bit!!}
# How many days a token stays valid — change freely
app.jwt.expiration-days=${JWT_EXPIRATION_DAYS:30}

# ─── CORS ─────────────────────────────────────────────────
# Comma-separated list of allowed origins
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:4173,https://flowlist-app.netlify.app}

# ─── Logging ──────────────────────────────────────────────
logging.level.com.flowlist=DEBUG
logging.level.org.springframework.security=WARN
