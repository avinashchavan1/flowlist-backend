name: Keep Render alive

# Render free tier spins down a web service after 15 min idle (~30-60s cold start
# on next hit). This workflow pings /api/health every 10 min so the service never
# goes idle. GitHub-scheduled crons can be delayed up to ~5 min under load, so
# 10-min cadence stays safely under Render's 15-min idle threshold.
#
# Cost: GitHub Actions free tier is unlimited minutes for public repos. Each ping
# uses ~5 seconds of runner time.

on:
  # NOTE: GH free-tier scheduled workflows are unreliable — actual gaps observed were
  # 80-260 min vs the configured 10 min, causing Render to spin down between runs.
  # Keep-alive is now handled by cron-job.org. Workflow kept for manual dispatch only.
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    # 5 min is enough for one cold-start (~60s) + 1 retry; previous 2 min caused mid-cleanup cancellation
    timeout-minutes: 5
    steps:
      - name: Ping health endpoint
        run: |
          set -e
          URL="https://flowlist-api-2kj8.onrender.com/api/health"
          # Render cold start typically <60s. Allow 2 retries with 3s gap.
          curl -fsS --retry 2 --retry-delay 3 --max-time 75 "$URL"
          echo "Pinged $URL OK"
