# ─── Server ───────────────────────────────────────────────
# Railway injects PORT; fall back to SERVER_PORT, then 8080
server.port=${PORT:${SERVER_PORT:8080}}

# ─── Database (PostgreSQL — Neon) ─────────────────────────
# DATABASE_URL format expected: jdbc:postgresql://<host>/<db>?sslmode=require
# Neon's raw connection string is postgresql://user:pass@host/db?sslmode=require —
# prepend "jdbc:" and split user/pass into DB_USERNAME / DB_PASSWORD env vars on Koyeb.
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:flowlist}}
spring.datasource.username=${DB_USERNAME:flowlist_user}
spring.datasource.password=${DB_PASSWORD:flowlist_pass}
spring.datasource.driver-class-name=org.postgresql.Driver

# ─── JPA / Hibernate ──────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ─── JWT ──────────────────────────────────────────────────
# Secret must be at least 256 bits (32 chars) for HS256
app.jwt.secret=${JWT_SECRET:flowlist-super-secret-key-change-in-production-256bit!!}
# How many days a token stays valid — change freely
app.jwt.expiration-days=${JWT_EXPIRATION_DAYS:30}

# ─── CORS ─────────────────────────────────────────────────
# Comma-separated list of allowed origins
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:4173,https://flowlist-app.netlify.app}

# ─── Email (Resend) ───────────────────────────────────────
# Get a free API key at https://resend.com
resend.api-key=${RESEND_API_KEY:}
# "From" address — use your verified domain or leave default for Resend sandbox
app.mail.from=${MAIL_FROM:Drift <onboarding@resend.dev>}
app.base-url=${APP_BASE_URL:https://flowlist-app.netlify.app}

# ─── Jackson ──────────────────────────────────────────────
spring.jackson.serialization.write-dates-as-timestamps=false

# ─── Logging ──────────────────────────────────────────────
logging.level.com.flowlist=${LOG_LEVEL:INFO}
logging.level.org.springframework.security=WARN


